<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Viewport & Basic Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="A modern React application built with Vite" />
    
    <!-- Open Graph / Social Media Meta -->
    <meta property="og:title" content="Vite + React App" />
    <meta property="og:description" content="A modern React application built with Vite" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourapp.com" />
    <meta property="og:image" content="/social-preview.png" />
    <meta property="og:site_name" content="Vite React App" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vite + React App" />
    <meta name="twitter:description" content="A modern React application built with Vite" />
    <meta name="twitter:image" content="/social-preview.png" />
    
    <!-- PWA & Web App Capable -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Security Headers -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
    
    <!-- Preload Critical Resources -->
    <link rel="preload" href="/src/main.jsx" as="script" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://api.yourapp.com" />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Vite + React App",
      "description": "A modern React application built with Vite",
      "url": "https://yourapp.com",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
    
    <!-- CSS Critical Path (inline for above-the-fold content) -->
    <style>
      /* Critical CSS for initial load */
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #ffffff;
        color: #000000;
      }
      
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      /* Loading indicator */
      .app-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-size: 1.2rem;
        color: #666;
      }
    </style>
    
    <!-- Non-critical CSS (loaded asynchronously) -->
    <link rel="stylesheet" href="/src/index.css" media="print" onload="this.media='all'" />
    
    <noscript>
      <style>
        .app-loading { display: none; }
      </style>
    </noscript>
    
    <title>Vite + React - Modern Web Application</title>
  </head>
  <body>
    <!-- Loading fallback for slow connections -->
    <div id="root">
      <div class="app-loading" role="status" aria-live="polite">
        Loading application...
      </div>
    </div>
    
    <!-- No Script Fallback -->
    <noscript>
      <div style="text-align: center; padding: 2rem; font-family: sans-serif;">
        <h1>JavaScript Required</h1>
        <p>This application requires JavaScript to function properly. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
    
    <!-- Main Application Script -->
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Performance Monitoring & Analytics -->
    <script>
      // Performance monitoring
      window.addEventListener('load', function() {
        // Remove loading indicator
        const loadingElement = document.querySelector('.app-loading');
        if (loadingElement) {
          loadingElement.style.display = 'none';
        }
        
        // Log performance metrics
        if ('performance' in window) {
          const perfData = window.performance.timing;
          const loadTime = perfData.loadEventEnd - perfData.navigationStart;
          console.log('Page load time:', loadTime + 'ms');
        }
      });
      
      // Error tracking
      window.addEventListener('error', function(e) {
        console.error('Global error caught:', e.error);
        // Here you would typically send to your error tracking service
        // Sentry.captureException(e.error);
      });
    </script>
  </body>
</html>
